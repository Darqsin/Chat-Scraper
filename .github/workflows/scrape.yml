name: Scrape Maricopa NTS

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Beginning date (MM/DD/YYYY)'
        required: false
      end_date:
        description: 'End date (MM/DD/YYYY)'
        required: false
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright pdf2image pytesseract openpyxl pillow usaddress pdfplumber img2pdf

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          cd scraper
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            python fetch.py --start-date "${{ github.event.inputs.start_date }}" --end-date "${{ github.event.inputs.end_date }}"
          else
            python fetch.py --lookback-days 1
          fi

      - name: Ensure output exists
        run: |
          mkdir -p grouped_output/pdfs
          echo "placeholder" > grouped_output/pdfs/.keep

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
    
          git commit -m "Update scraped data" || echo "No changes to commit"
    
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dashboard

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: scrape
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
